<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
      <h1>Simple Calculator</h1>
    <div class="calculator">
        <div class="output">
       <div class="previous-operand"></div>
       <div class="current-operand"></div>
      </div>
      
        <div class="buttons">
        <input type="button" id="AC" value="AC">
        <input type="button" id="DEL" value="DEL">
        <input type="button" class="operator" id="%" value="%">
        <input type="button" class="operator" id="/" value="/">
        <input type="button" class="number" id="9" value="9">
        <input type="button" class="number" id="8" value="8">
        <input type="button" class="number" id="7" value="7">
        <input type="button" class="operator" id="+" value="+">
        <input type="button" class="number" id="6" value="6">
        <input type="button" class="number" id="5" value="5">
        <input type="button" class="number" id="4" value="4">
        <input type="button" class="operator" id="-" value="-">
        <input type="button" class="number" id="3" value="3">
        <input type="button" class="number" id="2" value="2">
        <input type="button" class="number" id="1" value="1">
        <input type="button" class="operator" id="x" value="&#215">
        <input type="button" class="number" id="." value=".">
        <input type="button" class="number" id="0" value="0">
        <input type="button" id="equalTo" value="=">
    </div>
    </div>
  



 
     <script src="main.js"></script>
</body>
</html>
